<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пријава - Библиски Предизвик</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        📖
        <span>Библиски Предизвик</span>
    </div>

    <nav>
        <a href="index.html">Почетна</a>
        <a href="#">Правила</a>
        <a href="#">Контакт</a>
    </nav>
</header>


<section class="hero">

    <div class="bible-icon">
        📖
    </div>

    <h1>Пријава за квиз</h1>

    <h2>
        Внесете ги вашите податоци за учество
    </h2>


    <form class="register-form">

        <input type="text" placeholder="Име" required>

        <input type="text" placeholder="Презиме" required>

        <input type="text" placeholder="Град" required>

        <input type="tel" placeholder="Телефон" required>

        <input type="email" placeholder="E-mail (опционално)">


        <label class="check">
            <input type="checkbox" required>
            Се согласувам со правилата на квизот
        </label>

<button type="button" onclick="startQuiz()">
    Продолжи кон квиз
</button>

    </form>


</section>


<footer>

© 2026 Библиски Предизвик

</footer>

<script>

function startQuiz(){

let name =
document.querySelectorAll(".register-form input")[0].value;

let surname =
document.querySelectorAll(".register-form input")[1].value;

let city =
document.querySelectorAll(".register-form input")[2].value;

let phone =
document.querySelectorAll(".register-form input")[3].value;


if(name=="" || surname=="" || city=="" || phone==""){

alert("Ве молиме пополнете ги задолжителните полиња.");

return;

}


localStorage.setItem("name", name);
localStorage.setItem("surname", surname);
localStorage.setItem("city", city);
localStorage.setItem("phone", phone);


window.location.href="quiz.html";

}

</script>
</body>
</html>
